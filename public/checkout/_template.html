<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>__TIER_NAME__ — Lust Playhouse Checkout</title>
<script src="https://web.squarecdn.com/v1/square.js"></script>
<style>
  :root {
    --bg: #0a0618;
    --card-bg: #0d0b1a;
    --purple: #a855f7;
    --purple-light: #d8b4fe;
    --purple-deep: #7c3aed;
    --pink: #ec4899;
    --text: #f5f3ff;
    --text-dim: #9c93b8;
    --border: rgba(168,85,247,0.2);
    --error: #f87171;
    --green: #4ade80;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #0a0618;
    background-image:
      radial-gradient(circle at 50% 0%, rgba(124,58,237,0.25) 0%, transparent 60%),
      radial-gradient(circle at 50% 100%, rgba(236,72,153,0.18) 0%, transparent 60%),
      linear-gradient(to bottom, #160b2e, #0a0618, #050410);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 20px;
  }
  .brand {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(216,180,254,0.8);
    margin-bottom: 28px;
  }
  .card {
    width: 100%;
    max-width: 420px;
  }
  .tier-strip {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(18,15,36,0.8);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  .tier-strip-name {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--purple-light);
  }
  .tier-strip-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .tier-strip-price {
    font-size: 26px;
    font-weight: 900;
    color: #fff;
  }
  .checkout-box {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 0 50px rgba(168,85,247,0.12);
  }
  #apple-pay-container {
    display: none;
    margin-bottom: 16px;
  }
  #apple-pay-container apple-pay-button {
    --apple-pay-button-width: 100%;
    --apple-pay-button-height: 48px;
    --apple-pay-button-border-radius: 12px;
    --apple-pay-button-padding: 0;
  }
  .divider {
    display: none;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider-text {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .checkout-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  #card-container {
    background: #161329;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    min-height: 56px;
  }
  button#pay-button {
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    box-shadow: 0 0 20px rgba(168,85,247,0.35);
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }
  button#pay-button:hover { opacity: 0.92; }
  button#pay-button:active { transform: scale(0.98); }
  button#pay-button:disabled { opacity: 0.5; cursor: not-allowed; }
  .footnote {
    margin-top: 16px;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }
  #payment-status {
    margin-top: 14px;
    font-size: 13px;
    text-align: center;
    min-height: 18px;
  }
  #payment-status.error { color: var(--error); }
  #payment-status.success { color: var(--green); }
  .copyright {
    margin-top: 36px;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
  }
</style>
</head>
<body>

  <div class="brand">Lust Playhouse</div>

  <div class="card">
    <div class="tier-strip">
      <div>
        <div class="tier-strip-name">__TIER_NAME__ Tier</div>
        <div class="tier-strip-sub">One-time payment &middot; lifetime access</div>
      </div>
      <div class="tier-strip-price">$__TIER_PRICE__</div>
    </div>

    <div class="checkout-box">
      <!-- Apple Pay (only shown on eligible Apple devices) -->
      <div id="apple-pay-container"></div>
      <div class="divider" id="divider">
        <div class="divider-line"></div>
        <div class="divider-text">or pay with card</div>
        <div class="divider-line"></div>
      </div>

      <div class="checkout-label">Card details</div>
      <div id="card-container"></div>
      <button id="pay-button" disabled>Pay $__TIER_PRICE__</button>
      <div id="payment-status"></div>
      <p class="footnote">Encrypted checkout &middot; your card details never touch our servers</p>
    </div>
  </div>

  <div class="copyright">(c) 2026 Lust Playhouse</div>

<script>
(async function () {
  const tierId = "__TIER_ID__";
  const statusEl = document.getElementById('payment-status');
  const payButton = document.getElementById('pay-button');
  const applePayContainer = document.getElementById('apple-pay-container');
  const divider = document.getElementById('divider');

  // Shared: charge the card/Apple Pay token
  async function processPayment(sourceId) {
    const res = await fetch('/api/checkout/' + tierId, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sourceId }),
    });
    const data = await res.json();
    if (!res.ok || !data.success) {
      throw new Error(data.error || 'Payment failed. Please try again.');
    }
    return data;
  }

  try {
    const cfgRes = await fetch('/api/square-config');
    const cfg = await cfgRes.json();
    const payments = window.Square.payments(cfg.applicationId, cfg.locationId);

    // ── Apple Pay ──────────────────────────────────────────────
    try {
      const paymentRequest = payments.paymentRequest({
        countryCode: 'US',
        currencyCode: 'USD',
        total: {
          amount: '__TIER_PRICE__',
          label: '__TIER_NAME__ Membership',
        },
      });
      const applePay = await payments.applePay(paymentRequest);
      const applePayButton = await applePay.createButton({
        buttonType: 'plain',
        buttonColor: 'black',
      });
      applePayContainer.appendChild(applePayButton);
      applePayContainer.style.display = 'block';
      divider.style.display = 'flex';

      applePayButton.addEventListener('click', async () => {
        statusEl.className = '';
        statusEl.textContent = '';
        try {
          const tokenResult = await applePay.tokenize();
          if (tokenResult.status !== 'OK') {
            throw new Error(tokenResult.errors?.[0]?.message || 'Apple Pay failed.');
          }
          await processPayment(tokenResult.token);
          statusEl.className = 'success';
          statusEl.textContent = 'Payment successful! Redirecting…';
          window.location.href = '/success?tier=' + encodeURIComponent(tierId);
        } catch (err) {
          statusEl.className = 'error';
          statusEl.textContent = err.message || 'Something went wrong. Please try again.';
        }
      });
    } catch (e) {
      // Apple Pay unavailable on this browser/device — silently skip
      console.log('Apple Pay not available:', e.message);

      // TEMPORARY DEBUG — remove once Apple Pay is confirmed working
      const debugBox = document.createElement('div');
      debugBox.style.cssText = 'margin-top:12px;padding:10px;background:#2a1430;border:1px solid #f87171;border-radius:8px;color:#f87171;font-size:12px;word-break:break-word;';
      debugBox.textContent = 'Apple Pay debug: ' + (e && e.message ? e.message : String(e));
      applePayContainer.style.display = 'block';
      applePayContainer.appendChild(debugBox);
    }

    // ── Card ───────────────────────────────────────────────────
    const card = await payments.card({
      style: {
        input: { fontSize: '16px', color: '#f5f3ff' },
        'input::placeholder': { color: '#9c93b8' },
      },
    });
    await card.attach('#card-container');
    payButton.disabled = false;

    payButton.addEventListener('click', async () => {
      payButton.disabled = true;
      statusEl.className = '';
      statusEl.textContent = 'Processing…';

      try {
        const tokenResult = await card.tokenize();
        if (tokenResult.status !== 'OK') {
          throw new Error(tokenResult.errors?.[0]?.message || 'Card details look invalid.');
        }
        await processPayment(tokenResult.token);
        statusEl.className = 'success';
        statusEl.textContent = 'Payment successful! Redirecting…';
        window.location.href = '/success?tier=' + encodeURIComponent(tierId);
      } catch (err) {
        statusEl.className = 'error';
        statusEl.textContent = err.message || 'Something went wrong. Please try again.';
        payButton.disabled = false;
      }
    });

  } catch (err) {
    console.error(err);
    statusEl.className = 'error';
    statusEl.textContent = 'Could not load secure payment form. Please refresh and try again.';
  }
})();
</script>
</body>
</html>
