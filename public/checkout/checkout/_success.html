<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thank You — Lust Playhouse</title>
<style>
  :root {
    --purple: #a855f7;
    --purple-light: #d8b4fe;
    --pink: #ec4899;
    --text-dim: #9c93b8;
    --border: rgba(168,85,247,0.2);
    --error: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #0a0618;
    background-image:
      radial-gradient(circle at 50% 0%, rgba(124,58,237,0.25) 0%, transparent 60%),
      radial-gradient(circle at 50% 100%, rgba(236,72,153,0.18) 0%, transparent 60%),
      linear-gradient(to bottom, #160b2e, #0a0618, #050410);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #f5f3ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 20px;
    text-align: center;
  }
  .brand {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(216,180,254,0.8);
    margin-bottom: 24px;
  }
  .checkmark {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(168,85,247,0.1);
    border: 1px solid rgba(168,85,247,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    box-shadow: 0 0 20px rgba(168,85,247,0.25);
  }
  h1 {
    font-size: 22px;
    font-weight: 900;
    margin: 0 0 4px 0;
  }
  .sub {
    color: var(--text-dim);
    font-size: 14px;
    margin: 0 0 32px 0;
    max-width: 320px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: #0d0f1a;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }
  .card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
  }
  a.invite-link {
    display: block;
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    text-decoration: none;
    box-shadow: 0 0 20px rgba(168,85,247,0.35);
  }
  a.invite-link:hover { opacity: 0.92; }
  .error-text { color: var(--error); font-size: 14px; }
  .loading-text { color: var(--text-dim); font-size: 14px; }
  .copyright {
    margin-top: 36px;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
  }
</style>
</head>
<body>

  <div class="brand">Lust Playhouse</div>

  <div class="checkmark">
    <svg viewBox="0 0 24 24" fill="none" stroke="#d8b4fe" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>

  <h1>Thank you for your purchase!</h1>
  <p class="sub">Tap below to unlock your access — it only works once, so save it.</p>

  <div class="card">
    <div class="card-label" id="card-label">Loading…</div>
    <a id="invite-link" class="invite-link" href="#" target="_blank" rel="noreferrer" style="display:none;">Join Now</a>
    <p id="error-text" class="error-text" style="display:none;"></p>
  </div>

  <div class="copyright">(c) 2026 Lust Playhouse</div>

<script>
(async function () {
  const params = new URLSearchParams(window.location.search);
  const tierId = params.get('tier');
  const labelEl = document.getElementById('card-label');
  const linkEl = document.getElementById('invite-link');
  const errorEl = document.getElementById('error-text');

  if (!tierId) {
    labelEl.textContent = 'No tier specified';
    errorEl.textContent = 'Missing tier information. Please contact support.';
    errorEl.style.display = 'block';
    return;
  }

  try {
    const res = await fetch('/api/community-link/' + encodeURIComponent(tierId));
    if (!res.ok) throw new Error('not found');
    const data = await res.json();

    labelEl.textContent = data.name + ' Tier — Access Link';
    linkEl.href = data.link;
    linkEl.style.display = 'block';
  } catch (err) {
    labelEl.textContent = 'Could not load your link';
    errorEl.textContent = 'Please contact support with your payment confirmation.';
    errorEl.style.display = 'block';
  }
})();
</script>
</body>
</html>
